name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node scripts/generate-icons.mjs

      - name: Sync web assets
        run: cp -r mobile-app/* public/

      - name: Build server packages
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="lan-share-v${VERSION}"
          mkdir -p releases/.stage-server shared uploads
          cp server.mjs package.json LICENSE README.md releases/.stage-server/
          cp -r node_modules public releases/.stage-server/
          touch releases/.stage-server/shared/.gitkeep releases/.stage-server/uploads/.gitkeep
          cp start-server.sh releases/.stage-server/
          chmod +x releases/.stage-server/start-server.sh
          tar -czf releases/${TAG}-server-linux-x64.tar.gz -C releases/.stage-server .
          tar -czf releases/${TAG}-server-macos.tar.gz -C releases/.stage-server .
          zip -r releases/${TAG}-server-windows-x64.zip releases/.stage-server/
          echo "${TAG}-ios-pwa.txt" > releases/${TAG}-ios-pwa.txt

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: releases/*
          generate_release_notes: true
