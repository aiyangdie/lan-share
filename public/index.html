<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#4F46E5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="LanShare" />
  <title>LanShare</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="app">
    <!-- 连接 -->
    <section id="screen-setup" class="screen hidden">
      <div class="setup-wrap">
        <div class="brand">
          <div class="brand-mark">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>
          </div>
          <h1>电脑互传</h1>
          <p>同一 WiFi，手机与电脑互传文件</p>
        </div>

        <div class="card">
          <div class="discover-head">
            <span>附近电脑</span>
            <button class="btn ghost sm" id="btn-rescan" type="button">重新搜索</button>
          </div>
          <div id="discover-list" class="discover-list">
            <div class="discover-scanning">正在搜索附近电脑…</div>
          </div>
        </div>

        <div class="card">
          <label class="field">
            <span>或手动输入电脑地址</span>
            <input id="input-server" type="url" inputmode="url" placeholder="192.168.x.x:8787" autocomplete="off" />
          </label>
          <button class="btn primary full" id="btn-connect">连接</button>
        </div>

        <div id="setup-help" class="setup-help hidden">
          <p class="help-title">连接不上？请检查：</p>
          <ol>
            <li>电脑已双击运行 <strong>LanShare.exe</strong>（或 start-server.bat）</li>
            <li>手机和电脑连接<strong>同一 WiFi</strong></li>
            <li>Windows 防火墙允许 <strong>8787</strong> 端口</li>
            <li>关闭 VPN / 代理后重试</li>
          </ol>
          <p class="help-link"><a href="https://aiyangdie.github.io/lan-share/" target="_blank" rel="noopener">查看官网与下载</a></p>
        </div>

        <p class="hint">电脑先运行 LanShare，手机即可自动发现</p>
        <p class="ver-tag" id="ver-tag"></p>
      </div>
    </section>

    <!-- 主界面 -->
    <section id="screen-main" class="screen hidden">
      <header class="header">
        <div class="header-main">
          <h2 id="top-title">手机上传</h2>
          <div class="status" id="status-bar">
            <span class="status-dot" id="status-dot"></span>
            <span id="top-sub">已连接</span>
          </div>
        </div>
        <button class="icon-btn" id="btn-settings" aria-label="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </header>
      <p class="ver-bar" id="ver-bar"></p>

      <div id="toast" class="toast hidden"></div>

      <!-- 浏览 -->
      <div id="panel-browse" class="panel">
        <div class="path-bar">
          <button class="path-btn" id="btn-back" disabled>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="path-text" id="path-label">手机上传</div>
          <button class="path-btn" id="btn-refresh" aria-label="刷新">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
          </button>
        </div>
        <div class="file-list" id="file-list"></div>
      </div>

      <!-- 上传 -->
      <div id="panel-upload" class="panel hidden">
        <div class="upload-card" id="upload-zone">
          <div class="upload-ring">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 16V4"/><path d="m8 8 4-4 4 4"/><path d="M4 20h16"/></svg>
          </div>
          <p class="upload-title">选择文件上传</p>
          <p class="upload-desc">照片、视频、文档 · 保存到电脑</p>
          <input type="file" id="file-input" multiple accept="image/*,video/*,audio/*,.pdf,.doc,.docx,.zip,.apk" hidden />
          <button class="btn primary" id="btn-pick">选择文件</button>
        </div>
        <div id="upload-queue" class="upload-queue"></div>
      </div>

      <nav class="tabbar">
        <button class="tab active" data-tab="browse">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-6l-2-2H5a2 2 0 0 0-2 2z"/></svg>
          <span>浏览</span>
        </button>
        <button class="tab" data-tab="upload">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
          <span>上传</span>
        </button>
        <button class="tab" data-root="shared">
          <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>
          <span>共享</span>
        </button>
      </nav>
    </section>
  </div>
  <script src="version.js"></script>
  <script src="app.js"></script>
</body>
</html>
